name: PS2 Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PS2 Environment
        run: |
          # Persistently set paths for all subsequent steps
          echo "PS2DEV=/usr/local/ps2dev" >> $GITHUB_ENV
          echo "PS2SDK=/usr/local/ps2dev/ps2sdk" >> $GITHUB_ENV
          echo "PATH=/usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/bin:/bin" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          # The image is Alpine-based; ensure make and git are present
          apk update && apk add --no-cache build-base git

      - name: Compile CPS2emu
        run: |
          # Use the environment variables set in the Setup step
          make clean
          make

      - name: Upload ELF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPS2emu-PS2-Binary
          path: |
            *.ELF
            *.elf
