- name: Fix Source and Compile
        run: |
          # ... (Keep your previous mkdir and curl commands here) ...

          # Run make
          make \
            EE_CC="$EE_GCC_PATH" \
            EE_CXX="${BIN_DIR}/ee-g++" \
            EE_AR="${BIN_DIR}/ee-ar" \
            EE_LD="$EE_GCC_PATH"

      - name: Package ISO
        run: |
          apk add --no-cache cdrkit
          mkdir -p iso_root
          
          # 1. Copy the ELF and rename to uppercase for ISO standards
          cp bin/cps2emu.elf iso_root/CPS2EMU.ELF
          
          # 2. Create the SYSTEM.CNF (The boot instructions for PS2)
          echo "BOOT2 = cdrom0:\CPS2EMU.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          # 3. Create the ISO file
          mkisofs -o bin/cps2emu.iso -R -J -input-charset utf8 iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CPS2emu-PS2-Package
          path: |
            bin/cps2emu.elf
            bin/cps2emu.iso
