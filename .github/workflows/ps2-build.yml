name: PS2 Build
on: [push, pull_request]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk update
          apk add --no-cache build-base git curl cdrkit

      - name: Patch Source Code
        run: |
          # 1. Inject tamtypes.h and MAX_PATH at the very top of headers
          find src -name "emumain.h" -exec sed -i '1i #include <tamtypes.h>\n#ifndef MAX_PATH\n#define MAX_PATH 260\n#endif' {} +
          find src -name "emudraw.h" -exec sed -i '1i #include <tamtypes.h>' {} +
          
          # 2. Harmonize paths to use the folder prefixes consistently
          # This ensures #include "zfile.h" becomes #include "romconv/zfile.h" 
          # so it matches our directory structure.
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"zfile.h"|"romconv/zfile.h"|g' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"unzip.h"|"romconv/unzip.h"|g' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"sndintrf.h"|"sound/sndintrf.h"|g' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"qsound.h"|"sound/qsound.h"|g' {} +

          # 3. Specific fix for the "zip/" vs "romconv/" mismatch in emumain.h
          sed -i 's|zip/zfile.h|romconv/zfile.h|g' src/emumain.h
          sed -i 's|zip/unzip.h|romconv/unzip.h|g' src/emumain.h

          # 4. Remove DS3/DS4 references
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i '/[Dd][Ss][34]/d' {} +

      - name: Create Makefile
        run: |
          cat << 'EOF' > Makefile
          EE_BIN = bin/cps2emu.elf
          
          EE_OBJS = src/getopt.o src/emumain.o src/emudraw.o src/font.o \
                    src/romconv/unzip.o src/romconv/zfile.o \
                    src/sound/qsound.o src/sound/sndintrf.o \
                    src/cps2/state.o src/cps2/cache.o src/cps2/cps2.o src/cps2/cps2crpt.o \
                    src/cps2/driver.o src/cps2/eeprom.o src/cps2/inptport.o src/cps2/memintrf.o \
                    src/cps2/sprite.o src/cps2/timer.o src/cps2/vidhrdw.o src/cps2/loadrom.o \
                    src/cps2/coin.o src/cps2/hiscore.o src/cpu/m68000/c68k.o src/cpu/m68000/m68000.o \
                    src/cpu/z80/cz80.o src/cpu/z80/z80.o

          # The -I. is critical so the compiler can find "src/romconv/..." 
          # when a file in "src/" asks for it.
          EE_INCS = -I. -Isrc -Isrc/cps2 -Isrc/romconv -Isrc/sound -Isrc/cpu/m68000 -Isrc/cpu/z80 -I$(PS2SDK)/ports/include
          EE_LDFLAGS = -L$(PS2SDK)/ports/lib
          EE_LIBS = -lSDL -lz -lpatches -laudsrv -lm
          EE_CFLAGS = -DSDL -std=gnu99 -G0 -O2

          include $(PS2SDK)/samples/Makefile.pref
          include $(PS2SDK)/samples/Makefile.eeglobal

          all:
          	mkdir -p bin
          	$(MAKE) $(EE_BIN)

          clean:
          	rm -f $(EE_BIN) $(EE_OBJS)
          EOF

      - name: Build
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          make clean
          make

      - name: Package ISO
        run: |
          mkdir -p iso_root/ROMS
          curl -L https://github.com/ps2dev/ps2sdk-ports/raw/master/audsrv/irx/audsrv.irx -o iso_root/AUDSRV.IRX
          cp bin/cps2emu.elf iso_root/CPS2EMU.ELF
          printf "BOOT2 = cdrom0:\\\\CPS2EMU.ELF;1\nVER = 1.00\nVMODE = NTSC\n" > iso_root/SYSTEM.CNF
          mkisofs -o bin/cps2emu.iso -R -J -input-charset utf8 iso_root/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CPS2-PS2-ISO
          path: bin/cps2emu.iso
