name: PS2 Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    # This is the critical part to fix Error 127
    env:
      PS2DEV: /usr/local/ps2dev
      PS2SDK: /usr/local/ps2dev/ps2sdk
      PATH: /usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile CPS2emu
        run: |
          make clean
          make
          
      - name: Upload ELF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cps2emu-ps2
          path: "*.ELF"
