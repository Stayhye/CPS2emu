name: PS2 Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apk update && apk add --no-cache build-base git

      - name: Locate Toolchain and Compile
        run: |
          # 1. Find the actual path of ee-gcc
          # This command searches the container for the compiler and takes the first result
          EE_GCC_PATH=$(find /usr/local/ps2dev -name "ee-gcc" | head -n 1)
          BIN_DIR=$(dirname "$EE_GCC_PATH")
          
          echo "Found ee-gcc at: $EE_GCC_PATH"
          echo "Adding $BIN_DIR to PATH"
          
          # 2. Export the path so 'make' can see it
          export PATH="$BIN_DIR:$PATH"
          
          # 3. Run make
          # We pass the paths directly into the variables the PS2SDK Makefile expects
          make \
            EE_CC="$EE_GCC_PATH" \
            EE_CXX="${BIN_DIR}/ee-g++" \
            EE_AR="${BIN_DIR}/ee-ar" \
            EE_LD="$EE_GCC_PATH"

      - name: Upload ELF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPS2emu-PS2-Binary
          path: |
            *.ELF
            *.elf
            src/*.ELF
            src/*.elf
