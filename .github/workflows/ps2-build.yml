name: PS2 Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          # Ensure make is available in the Alpine container
          apk update && apk add --no-cache build-base git

      - name: Compile CPS2emu
        run: |
          # We run make from the root. 
          # We use -f Makefile just in case it's named differently, 
          # but usually 'make' alone works here.
          make \
            EE_CC=/usr/local/ps2dev/ee/bin/ee-gcc \
            EE_CXX=/usr/local/ps2dev/ee/bin/ee-g++ \
            EE_AR=/usr/local/ps2dev/ee/bin/ee-ar \
            EE_LD=/usr/local/ps2dev/ee/bin/ee-gcc

      - name: Upload ELF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPS2emu-PS2-Binary
          path: |
            *.ELF
            *.elf
            src/*.ELF
            src/*.elf
