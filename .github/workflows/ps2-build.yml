name: PS2 Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apk update && apk add --no-cache build-base git curl

      - name: Fix Source and Compile
        run: |
          # 1. Create the directories the Makefile expects
          mkdir -p src/zip
          mkdir -p src/sound
          mkdir -p src/cps2
          mkdir -p src/cpu/m68000
          mkdir -p src/cpu/z80
          mkdir -p bin

          # 2. Download the missing ZIP handling files 
          # These are required by your OBJS list: src/zip/unzip.o and src/zip/zfile.o
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/unzip.c -o src/zip/unzip.c
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/unzip.h -o src/zip/unzip.h
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/zfile.c -o src/zip/zfile.c
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/zfile.h -o src/zip/zfile.h

          # 3. Locate the toolchain
          EE_GCC_PATH=$(find /usr/local/ps2dev -name "ee-gcc" | head -n 1)
          BIN_DIR=$(dirname "$EE_GCC_PATH")
          export PATH="$BIN_DIR:$PATH"

          # 4. Run make
          # We force the PS2SDK include at the end to ensure it compiles for the right platform
          make \
            EE_CC="$EE_GCC_PATH" \
            EE_CXX="${BIN_DIR}/ee-g++" \
            EE_AR="${BIN_DIR}/ee-ar" \
            EE_LD="$EE_GCC_PATH"

      - name: Upload ELF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPS2emu-PS2-Binary
          # Your Makefile defines EE_BIN = bin/cps2emu.elf
          path: bin/cps2emu.elf
