name: PS2 Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apk update && apk add --no-cache build-base git curl cdrkit

      - name: Fix Source and Compile
        run: |
          # 1. Create directory structure
          mkdir -p src/zip src/sound src/cps2 src/cpu/m68000 src/cpu/z80 bin
          
          # 2. Download missing source files
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/unzip.c -o src/zip/unzip.c
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/unzip.h -o src/zip/unzip.h
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/zfile.c -o src/zip/zfile.c
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/zip/zfile.h -o src/zip/zfile.h
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/sound/sndintrf.c -o src/sound/sndintrf.c
          curl -L https://raw.githubusercontent.com/gameblabla/cps2emu/master/src/sound/sndintrf.h -o src/sound/sndintrf.h

          # --- CASE SENSITIVITY PATCH ---
          # Patching code to look for uppercase filenames for CD-ROM
          # Using find to ensure we hit all directories (src/ps2, src/cps2, etc)
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/"rominfo.cps2"/"ROMINFO.CPS2"/g' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/"zipname.cps2"/"ZIPNAME.CPS2"/g' {} +
          # ------------------------------

          # 3. Locate the toolchain
          EE_GCC_PATH=$(find /usr/local/ps2dev -name "ee-gcc" | head -n 1)
          BIN_DIR=$(dirname "$EE_GCC_PATH")
          # Export to path for the sub-processes
          export PATH="$BIN_DIR:$PATH"
          
          # 4. Run make
          # Removed the ./ from ee-strip and used the variable to ensure it is found
          make \
            CC="$EE_GCC_PATH" \
            EE_CC="$EE_GCC_PATH" \
            EE_CXX="${BIN_DIR}/ee-g++" \
            EE_AR="${BIN_DIR}/ee-ar" \
            EE_LD="$EE_GCC_PATH"

          # 5. Strip the ELF (using the full path to the binary)
          if [ -f bin/cps2emu.elf ]; then
            ${BIN_DIR}/ee-strip bin/cps2emu.elf
          else
            echo "Error: bin/cps2emu.elf not found, make might have failed."
            exit 1
          fi

      - name: Package ISO with IRX Bundle
        run: |
          mkdir -p iso_root
          
          # 1. Copy the compiled ELF to the ISO root
          cp bin/cps2emu.elf iso_root/CPS2EMU.ELF
          
          # 2. Add the ROM database and rename it to Uppercase
          # If it exists in your repo, copy it. Otherwise, it will use the one you added for AVP.
          cp rominfo.cps2 iso_root/ROMINFO.CPS2 || touch iso_root/ROMINFO.CPS2
          cp zipname.cps2 iso_root/ZIPNAME.CPS2 || touch iso_root/ZIPNAME.CPS2
          
          # 3. Download IRX files
          curl -L https://github.com/ps2dev/ps2sdk-ports/raw/master/usbd/irx/usbd.irx -o iso_root/USBD.IRX
          curl -L https://github.com/ps2dev/ps2sdk-ports/raw/master/usbkbd/irx/usbkbd.irx -o iso_root/USBKBD.IRX
          
          # 4. Create the SYSTEM.CNF
          echo "BOOT2 = cdrom0:\CPS2EMU.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          # 5. Generate ISO (Adding -f to follow symlinks if any)
          mkisofs -o bin/cps2emu.iso -R -J -input-charset utf8 iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CPS2emu-PS2-ISO-Package
          path: |
            bin/cps2emu.elf
            bin/cps2emu.iso
