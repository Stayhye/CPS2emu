name: PS2 Build
on: [push, pull_request]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk update
          apk add --no-cache build-base git curl cdrkit

      - name: Patch and Flatten Source
        run: |
          # 1. Inject tamtypes.h to fix u32/u8 errors
          sed -i '1i #include <tamtypes.h>' src/emumain.h
          sed -i '1i #include <tamtypes.h>' src/emudraw.h
          
          # 2. Remove DS3/DS4 references (case-sensitive variants for BusyBox sed)
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i '/ds3/d' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i '/DS3/d' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i '/ds4/d' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i '/DS4/d' {} +

          # 3. Physically move files from romconv to src
          # Using explicit filenames to ensure BusyBox handles it
          if [ -d "src/romconv" ]; then
            cp src/romconv/zfile.h src/zfile.h
            cp src/romconv/zfile.c src/zfile.c
            cp src/romconv/unzip.h src/unzip.h
            cp src/romconv/unzip.c src/unzip.c
            echo "Files moved from src/romconv to src/"
          fi
          
          # 4. Clean up all include paths project-wide
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|romconv/||g' {} +
          find src -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|zip/||g' {} +

          # 5. Debug: List files to verify existence
          ls -l src/zfile.h src/unzip.h

      - name: Create Makefile
        run: |
          cat << 'EOF' > Makefile
          EE_BIN = bin/cps2emu.elf
          
          # Object list now assumes flattened src/ directory
          EE_OBJS = src/getopt.o src/emumain.o src/emudraw.o src/font.o \
                    src/unzip.o src/zfile.o src/qsound.o src/sndintrf.o \
                    src/cps2/state.o src/cps2/cache.o src/cps2/cps2.o src/cps2/cps2crpt.o \
                    src/cps2/driver.o src/cps2/eeprom.o src/cps2/inptport.o src/cps2/memintrf.o \
                    src/cps2/sprite.o src/cps2/timer.o src/cps2/vidhrdw.o src/cps2/loadrom.o \
                    src/cps2/coin.o src/cps2/hiscore.o src/cpu/m68000/c68k.o src/cpu/m68000/m68000.o \
                    src/cpu/z80/cz80.o src/cpu/z80/z80.o

          # Include src first so "zfile.h" is found immediately
          EE_INCS = -Isrc -Isrc/cps2 -Isrc/sound -I$(PS2SDK)/ports/include
          EE_LDFLAGS = -L$(PS2SDK)/ports/lib
          EE_LIBS = -lSDL -lz -lpatches -laudsrv -lm
          EE_CFLAGS = -DSDL -std=gnu99 -G0 -O2

          include $(PS2SDK)/samples/Makefile.pref
          include $(PS2SDK)/samples/Makefile.eeglobal

          all:
          	mkdir -p bin
          	$(MAKE) $(EE_BIN)

          clean:
          	rm -f $(EE_BIN) $(EE_OBJS)
          EOF

      - name: Build
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          make clean
          make

      - name: Package ISO
        run: |
          mkdir -p iso_root/ROMS
          curl -L https://github.com/ps2dev/ps2sdk-ports/raw/master/audsrv/irx/audsrv.irx -o iso_root/AUDSRV.IRX
          cp bin/cps2emu.elf iso_root/CPS2EMU.ELF
          printf "BOOT2 = cdrom0:\\\\CPS2EMU.ELF;1\nVER = 1.00\nVMODE = NTSC\n" > iso_root/SYSTEM.CNF
          mkisofs -o bin/cps2emu.iso -R -J -input-charset utf8 iso_root/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPS2-PS2-ISO
          path: bin/cps2emu.iso
